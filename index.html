<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <script>
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const today = new Date();
        const current_month = today.getMonth();
        const current_year = today.getFullYear();
        document.write(months[today.getMonth()]);
        document.write(today.getFullYear());

        function daysInMonth(month, year) { // 1 - January
            return new Date(year, month + 1, 0).getDate();
        }
        daysInCurrentMonth = daysInMonth(current_month, current_year, 0);
        firstWeekDay = new Date(current_year, current_month, 1).getDay();

        document.write('<br>');
        const weekDays = ["Su", "M", "Tu", "W", "Th", "F", "Sa"]
        for (var i = 0; i < weekDays.length; i++) {
            document.write('<p id="weekDay">' + weekDays[i] + '</p>');
        }
        document.write('<br>');

        var newLineCount = 0;
        for (var i = 0; i < firstWeekDay; i++) {
            document.write('<div class="squares">');
            document.write('<p id="emptyDay">&nbsp</p>');
            document.write('</div>');
            newLineCount++;
        }
        for (var i = 1; i <= daysInCurrentMonth; i++) {
            if (i != today.getDate()) {
                document.write('<div class="squares">');
            } else {
                document.write('<div class="currentDay">');
            }

            if (i > 9) {
                document.write('<p id="dayDoubleDigit">' + i + '</p>');
            } else {
                document.write('<p id="daySingleDigit">' + i + '</p>');
            }

            document.write('</div>');

            newLineCount++;
            if (newLineCount % 7 == 0) {
                document.write('<br>');
            }
        }

    </script>

</body>
</html>
