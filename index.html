<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div id="calendar">
    <script>
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const today = new Date();
        const current_month = today.getMonth();
        const current_year = today.getFullYear();
        document.write(months[today.getMonth()]);
        document.write(today.getFullYear());

        function daysInMonth(month, year) { // 1 - January
            return new Date(year, month + 1, 0).getDate();
        }
        daysInCurrentMonth = daysInMonth(current_month, current_year, 0);
        firstWeekDay = new Date(current_year, current_month, 1).getDay();

        document.write('<br>');
        const weekDays = ["Su", "M", "Tu", "W", "Th", "F", "Sa"]
        for (var i = 0; i < weekDays.length; i++) {
            document.write('<p id="weekDay">' + weekDays[i] + '</p>');
        }
        document.write('<br>');

        var newLineCount = 0;
        for (var i = 0; i < firstWeekDay; i++) {
            document.write('<div class="squares">');
            document.write('<p id="emptyDay">&nbsp</p>');
            document.write('</div>');
            newLineCount++;
        }
        for (var i = 1; i <= daysInCurrentMonth; i++) {

            if (i > 9) {
                if (i != today.getDate()) {
                    document.write('<div id=' + String(i) + ' class="squares">');
                } else {
                    document.write('<div id=' + String(i) + ' class="squares currentDay">');
                }
                document.write('<p id="dayDoubleDigit">' + i + '</p>');
            } else {
                if (i != today.getDate()) {
                    document.write('<div id=' + String(i) + ' class="squares">');
                } else {
                    document.write('<div id=' + String(i) + ' class="squares currentDay">');
                }
                document.write('<p id="daySingleDigit">' + i + '</p>');
            }

            document.write('</div>');

            newLineCount++;
            if (newLineCount % 7 == 0) {
                document.write('<br>');
            }
        }

        const dates = document.getElementsByClassName("squares");

        var current_day = 0;

        for (var i = 0; i < dates.length; i++) {
            dates[i].addEventListener("click", (date) => {
                current_day = date.target.id;
                document.getElementById("form").style.display = "block";
                var hours = localStorage.getItem(current_year + "-" + current_month + "-" + current_day);
                if (hours == null) {
                    hours = 0;
                }
                document.getElementById("hoursRecorded").innerHTML = "<p>Hour(s) Recorded: " + hours + "<\p>";
            });
        }

        function closeForm() {
            var hoursInput = document.getElementById("hours");
            localStorage.setItem(current_year + "-" + current_month + "-" + current_day, hoursInput.value);

            document.getElementById("form").style.display = "none";
        }
    </script>
    </div>

    <div id="form">
        <form>
            <label for="hours">Hours: </label><br>
            <input type="text" id="hours" name="hours"><br>
            <button type="button" class="cancelButton" onclick="closeForm()">Close</button>
        </form>
        <p id="hoursRecorded">Hours Recorded: </p>
    </div>

</body>
</html>
